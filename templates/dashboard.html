<!DOCTYPE html>
<html>
<head>
    <title>Complaint Form</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial;
            background: url("/static/mycomplaints_bg.jpg") no-repeat center center fixed;
            background-size: cover;
            background-attachment: fixed;
        }

        /* CENTER BOX */
        .container {
            width: 360px;
            margin: auto;
            margin-top: 90px;
            background: rgba(12, 12, 12, 0.2);
            padding: 35px;
            border: 3px solid #ffcc00;
            border-radius: 30px;
            text-align: center;
            color: rgb(217, 246, 246);
        }

        .container h2 {
            margin-bottom: 15px;
            font-size: 33px;
            border-radius: 12px;
            text-decoration: thick;
            background: #0f0f0f;
            color: white;
        }

        /* INPUTS */
        input, textarea, select {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            border: none;
            border-radius: 4px;
        }

        textarea {
            height: 50px;
        }

        input[type="file"] {
            background: rgb(252, 252, 252);
            color: black;
        }

        /* BUTTON */
        button {
            width: 95%;
            padding: 10px;
            margin-top: 10px;
            background: #ffcc00;
            border: none;
            color: black;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
        }

        button:hover {
            background: orange;
        }
        .My_Complaints span {
            color: #00ff15;
        }
        .top-menu {
    position: absolute;
    top: 20px;
    right: 30px;
}

.top-menu a {
    text-decoration: thick;
    background: #0f0f0f;
    color: white;
    padding: 5px 20px;
    margin-left: 30px;
    border-radius: 7px;
    font-weight: bold;
}

.top-menu a:hover {
    background: #0072ff;
}
    </style>

</head>

<body>

<div class="container">

    <h2>Submit Complaint</h2>

    <form action="/submit_complaint" method="POST" enctype="multipart/form-data">

        <input type="text" name="title" placeholder="Title" required>
        <input type="text" name="address" placeholder="Enter problem location / address" required>
        <textarea name="description" placeholder="Description" required></textarea>

        <select name="category">
            <option>Water</option>
            <option>Electricity</option>
            <option>Road</option>
            <option>Others</option>
        </select>

        <select name="priority">
            <option>Low</option>
            <option>Medium</option>
            <option>High</option>
        </select>

        <input type="file" name="image">

        <button type="submit">SUBMIT</button>

    </form>

</div>
<div class="top-menu">
    <a href="/my_complaints">My Complaints</a>
    <a href="/logout">Logout</a>
</div>

</body>
</html>
